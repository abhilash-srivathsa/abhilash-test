chat:
  auto_reply: true
code_generation:
  unit_tests:
    path_instructions:
      - path: "**/*.ts"
        instructions: |
          - Use vitest as the testing framework
          - Place test files adjacent to the implementation files with the naming pattern `*.test.ts`
          - Import the functions/classes directly from the implementation file
          - Organize tests with describe blocks for grouping related tests
          - Use it/test functions for individual test cases
          - Prefer pure function testing approaches when possible
          - Use mocks sparingly and only when necessary
          - Include tests for error cases and edge conditions
          - Add appropriate types for all test variables and mocked objects
          - Use meaningful assertion messages that explain what is being verified
          - Follow the existing test patterns in the codebase
          - Do not use testing libraries other than vitest
